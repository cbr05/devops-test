services:
  # ============================================
  # APP 1 - Python FastAPI (Cache 10 segundos)
  # ============================================
  app1:
    build:
      context: ./app1
      dockerfile: Dockerfile
    container_name: devops-test-app1
    image: devops-test/app1:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - CACHE_TTL=10
      - LOG_LEVEL=INFO
      - APP_VERSION=1.0.0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - devops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================
  # APP 2 - Go (Cache 60 segundos)
  # ============================================
  app2:
    build:
      context: ./app2
      dockerfile: Dockerfile
    container_name: devops-test-app2
    image: devops-test/app2:latest
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - CACHE_TTL=60
      - APP_VERSION=1.0.0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - devops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ============================================
  # REDIS - Cache Layer
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: devops-test-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # NGINX - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: devops-test-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - devops-network

  # ============================================
  # PROMETHEUS - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: devops-test-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devops-network
    depends_on:
      - app1
      - app2

  # ============================================
  # GRAFANA - Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: devops-test-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info
      - GF_PROVISIONING_DASHBOARDS_ENABLED=true
      - GF_PROVISIONING_DATASOURCES_ENABLED=true
      - GF_PROVISIONING_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - devops-network

  # ============================================
  # REDIS EXPORTER - Prometheus metrics for Redis
  # ============================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.57.0
    container_name: devops-test-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=redis123
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devops-network

  # ============================================
  # NGINX EXPORTER - Prometheus metrics for Nginx
  # ============================================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.2.0
    container_name: devops-test-nginx-exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - -nginx.scrape-uri=http://nginx:80/metrics
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - devops-network

  # ============================================
  # LOAD GENERATOR - Gera metricas automaticamente
  # ============================================
  loadgen:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: devops-test-loadgen
    restart: unless-stopped
    depends_on:
      - app1
      - app2
    networks:
      - devops-network

# ============================================
# NETWORKS
# ============================================
networks:
  devops-network:
    driver: bridge
    name: devops-network

# ============================================
# VOLUMES
# ============================================
volumes:
  redis-data:
    name: devops-test-redis-data
  prometheus-data:
    name: devops-test-prometheus-data
  grafana-data:
    name: devops-test-grafana-data
